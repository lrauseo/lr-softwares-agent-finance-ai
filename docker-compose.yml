version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_ai_agent
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_ai_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

