spring:
  application:
    name: finance_ai_agent

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_ai_agent
    username: finance_user
    password: finance_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  ai:
    openai:
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        completions-path: ${AI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${AI_MODEL:gpt-4.1-mini}
      embedding:
        embeddings-path: ${AI_EMBEDDINGS_PATH:/v1/embeddings}
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        table-name: vector_store

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080

app:
  knowledge:
    docs-path: docs/rag
    seed:
      enabled: true
      overwrite: true
      language: pt-BR
      audience: BEGINNER
jwt:
  secret: ${JWT_SECRET:secret-key-super-segura}