spring:
  application:
    name: finance_ai_agent

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_ai_agent
    username: finance_user
    password: finance_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  ai:
    openai:
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        completions-path: ${AI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${AI_MODEL:gpt-4.1-mini}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080